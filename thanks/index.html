    <style>
        /* Critical CSS — applied before any other stylesheet so the layout never collapses */
        body{margin:0;font-family:'Garet',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-text-size-adjust:100%;text-size-adjust:100%}
        html,body{overflow-x:hidden;max-width:100vw}
        *,*::before,*::after{box-sizing:border-box}
        img,video,iframe,svg,picture{max-width:100%;height:auto;display:inline-block}
        img.service-icon{width:80px!important;height:80px!important;max-width:80px!important;max-height:80px!important;object-fit:contain;margin:0 auto 0.75rem;display:block}
        .container{width:100%;max-width:1200px;margin:0 auto;padding-left:clamp(0.85rem,4vw,2rem);padding-right:clamp(0.85rem,4vw,2rem)}
        .bg-custom-cyan{background:#0CC0DF}
        nav.bg-custom-cyan{padding:0.75rem 0;color:white}
        .nav-container{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:0.5rem;padding:1rem;width:100%;max-width:1200px;margin:0 auto}
        .contact-info{display:flex;flex-direction:column;align-items:flex-end;gap:0.25rem;font-size:.95rem}
        .contact-info a{color:#fff;text-decoration:none}
        section{padding:clamp(2rem,5vw,4rem) 0}
        h1,h2,h3{margin:0 0 .75rem}
        @media (max-width:720px){
            .nav-container{flex-direction:column;align-items:flex-start;gap:.4rem}
            .contact-info{align-items:flex-start;font-size:.95rem}
            body{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
            img.service-icon{width:64px!important;height:64px!important}
        }
    </style>
