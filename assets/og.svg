<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0CC0DF"/>
      <stop offset="100%" stop-color="#0aa3bd"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative window panes (top-left) -->
  <g opacity="0.12">
    <rect x="40" y="40" width="220" height="220" stroke="white" stroke-width="3" fill="none"/>
    <line x1="150" y1="40" x2="150" y2="260" stroke="white" stroke-width="2"/>
    <line x1="40" y1="150" x2="260" y2="150" stroke="white" stroke-width="2"/>
  </g>

  <!-- Decorative window panes (bottom-right) -->
  <g opacity="0.12">
    <rect x="940" y="370" width="220" height="220" stroke="white" stroke-width="3" fill="none"/>
    <line x1="1050" y1="370" x2="1050" y2="590" stroke="white" stroke-width="2"/>
    <line x1="940" y1="480" x2="1160" y2="480" stroke="white" stroke-width="2"/>
  </g>

  <!-- Center logo medallion -->
  <g transform="translate(600,180)">
    <circle cx="0" cy="0" r="64" fill="white" filter="url(#shadow)"/>
    <text x="0" y="22" font-family="Arial Black, Arial, sans-serif" font-size="84" font-weight="900" text-anchor="middle" fill="#0CC0DF">O</text>
  </g>

  <!-- Brand name -->
  <text x="600" y="320" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900" text-anchor="middle" fill="white" letter-spacing="2">OCS LLC</text>

  <!-- Tagline -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="34" font-weight="600" text-anchor="middle" fill="white">Window Cleaning &amp; Pressure Washing</text>

  <!-- Service area -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="22" font-weight="400" text-anchor="middle" fill="white" opacity="0.92">Kalispell · Whitefish · Columbia Falls · Bigfork</text>

  <!-- Bottom trust band -->
  <rect x="0" y="510" width="1200" height="120" fill="white" opacity="0.96"/>
  <g transform="translate(600,560)">
    <text x="-280" y="8" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0CC0DF">5.0★ on Google</text>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0CC0DF">Licensed &amp; Insured</text>
    <text x="280" y="8" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#0CC0DF">Family-Owned</text>
  </g>
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#374151">(406) 607-2151 · ocsllc.services</text>
</svg>
