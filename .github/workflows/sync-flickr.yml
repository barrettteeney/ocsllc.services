name: Sync Flickr photos

on:
  schedule:
    - cron: '37 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pull new photos from Flickr feed
        env:
          FLICKR_USER_ID: '202677555@N02'
          REPO_ROOT: ${{ github.workspace }}
        run: python scripts/sync_flickr.py
      - name: Commit if changed
        run: |
          git config user.name  "ocs-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "auto: sync Flickr photos [skip ci]"
            git push
          fi
