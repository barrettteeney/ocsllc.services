name: Broken-link check

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --accept 200,206,301,302,403,429
            --exclude-mail
            --exclude '^https?://(?:www\.)?(?:facebook|instagram|twitter|x|linkedin|pinterest)\.com'
            --exclude 'tel:'
            --exclude 'mailto:'
            './**/*.html'
          fail: false
          format: markdown
          output: lychee-report.md
      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Broken links detected — weekly link check'
          content-filepath: lychee-report.md
          labels: link-check, automated
