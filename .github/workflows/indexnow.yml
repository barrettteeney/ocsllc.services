name: IndexNow ping

on:
  push:
    branches: [main]
    paths:
      - '**/index.html'
      - '404.html'
      - 'sitemap.xml'
      - 'robots.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ping IndexNow with sitemap URLs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          HOST: ocsllc.services
        run: |
          python -c "import re,os,urllib.request; xml=urllib.request.urlopen('https://ocsllc.services/sitemap.xml',timeout=15).read().decode(); urls='\n'.join(re.findall(r'<loc>([^<]+)</loc>',xml)); open('/tmp/u.txt','w').write(urls)"
          cat /tmp/u.txt | head -5
          export CHANGED_URLS="$(cat /tmp/u.txt)"
          python scripts/indexnow_ping.py
