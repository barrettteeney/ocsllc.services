name: Weekly backup tag

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Configure git
        run: |
          git config user.name  "ocs-bot"
          git config user.email "actions@users.noreply.github.com"
      - name: Create backup tag
        run: python scripts/backup_snapshot.py
