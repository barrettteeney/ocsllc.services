name: Lighthouse weekly audit

on:
  schedule:
    - cron: '13 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://ocsllc.services/
            https://ocsllc.services/kalispell/
            https://ocsllc.services/services/residential/
            https://ocsllc.services/services/pressure-washing/
            https://ocsllc.services/about/
            https://ocsllc.services/reviews/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
